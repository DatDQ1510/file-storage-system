services:
  postgres:
    image: postgres:16-alpine
    container_name: file_storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: file_storage_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_storage_system"]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"   # Cổng kết nối App
      - "15672:15672" # Cổng giao diện quản lý (Web UI)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
#    deploy:
#      resources:
#        limits:
#          memory: 1gb # Giới hạn cứng RAM cho RabbitMQ container
  redis:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes


volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
