spring:
  application:
    name: file_storage_system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/file_storage_system}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
  threads:
    virtual:
      enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0 # Default database
      timeout: 60s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8

app:
  security:
    system-admin-bootstrap-secret: ${SYSTEM_ADMIN_BOOTSTRAP_SECRET:}
    jwt-secret: ${JWT_SECRET:replace-this-with-a-very-long-secret-key-at-least-32-bytes}
    jwt-access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    jwt-refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}


minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:file-storage}
  secure: ${MINIO_SECURE:false}